name: Build

on:
  release:
    types:
      - created

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        jobs:
          - { goos: linux, goarch: amd64, goamd64: v3, output: amd64, debian: amd64, rpm: x86_64 }
          - { goos: linux, goarch: arm64, output: arm64, debian: arm64, rpm: aarch64 }

          - { goos: darwin, goarch: amd64, goamd64: v3, output: amd64 }
          - { goos: darwin, goarch: arm64, output: arm64 }

          - { goos: windows, goarch: amd64, goamd64: v3, output: amd64 }
          - { goos: windows, goarch: arm64, output: arm64 }

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set variables
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.release.tag_name }}}"
          VERSION="${TAG,,}-$(git rev-parse --short HEAD)"
          VERSION="${VERSION//\//-}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Build core
        env:
          GOOS: ${{ matrix.jobs.goos }}
          GOARCH: ${{ matrix.jobs.goarch }}
          GOAMD64: ${{ matrix.jobs.goamd64 }}
          GOARM: ${{ matrix.jobs.goarm }}
        run: |
          set -eux

          EXT=""
          if [ "${{ matrix.jobs.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          go env
          LDFLAGS="-X main.version=${VERSION}"

          go build -v -ldflags "$LDFLAGS" -o "punchd${EXT}" ./cmd/punchd
          go build -v -ldflags "$LDFLAGS" -o "punchctl${EXT}" ./cmd/punchctl

          ASSET="punch-${{ matrix.jobs.goos }}-${{ matrix.jobs.output }}-${TAG}"

          mkdir "$ASSET"
          cp "punchd${EXT}" "$ASSET/"
          cp "punchctl${EXT}" "$ASSET/"

          if [ "${{ matrix.jobs.goos }}" = "windows" ]; then
            zip -r "${ASSET}.zip" "$ASSET"
          else
            tar -czf "${ASSET}.tar.gz" "$ASSET"
          fi

      - name: Package DEB
        if: matrix.jobs.debian != ''
        run: |
          set -xeuo pipefail
          sudo gem install --no-document fpm
          cp .github/release/.fpm .fpm

          PKGVER="${TAG#v}"

          fpm -t deb \
            -v "${PKGVER}" \
            -p "punch-${{ matrix.jobs.goos }}-${{ matrix.jobs.output }}-${TAG}.deb" \
            --architecture ${{ matrix.jobs.debian }} \
            punchd=/usr/bin/punchd \
            punchctl=/usr/bin/punchctl

      - name: Package RPM
        if: matrix.jobs.rpm != ''
        run: |
          set -xeuo pipefail
          sudo gem install --no-document fpm
          cp .github/release/.fpm .fpm

          PKGVER="${TAG#v}"
          PKGVER="${PKGVER//-/_}"

          fpm -t rpm \
            -v "${PKGVER}" \
            -p "punch-${{ matrix.jobs.goos }}-${{ matrix.jobs.output }}-${TAG}.rpm" \
            --architecture ${{ matrix.jobs.rpm }} \
            punchd=/usr/bin/punchd \
            punchctl=/usr/bin/punchctl

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${TAG}" \
            punch-${{ matrix.jobs.goos }}-${{ matrix.jobs.output }}-${TAG}.* \
            --clobber

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Set variables
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.release.tag_name }}}"
          VERSION="${TAG,,}-$(git rev-parse --short HEAD)"
          VERSION="${VERSION//\//-}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG }}
            type=semver,pattern={{major}},value=${{ env.TAG }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
